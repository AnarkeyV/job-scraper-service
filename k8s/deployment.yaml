apiVersion: apps/v1
kind: Deployment
metadata:
  name: job-scraper-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: job-scraper-service
  template:
    metadata:
      labels:
        app: job-scraper-service
    spec:
      containers:
        - name: app
          image: job-scraper-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: PUBLIC_BASE_URL
              value: "http://localhost:8000"
---
apiVersion: v1
kind: Service
metadata:
  name: job-scraper-service
spec:
  selector:
    app: job-scraper-service
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
